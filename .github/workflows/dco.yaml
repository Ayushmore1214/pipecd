name: dco

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check DCO sign-off
        id: dco-check
        run: |
          # Get the merge base to compare against
          git fetch origin ${{ github.base_ref }} --depth=1
          MERGE_BASE=$(git merge-base HEAD origin/${{ github.base_ref }})
          
          # Get all commit hashes in this PR (excluding merge commits)
          COMMIT_HASHES=$(git log --no-merges --reverse --format=format:"%H" "$MERGE_BASE..HEAD")
          
          MISSING_DCO=""
          for commit_hash in $COMMIT_HASHES; do
            sign_off=$(git log -1 --format="%(trailers:key=Signed-off-by,valueonly)%-C()" "$commit_hash")
            if [ -z "$sign_off" ]; then
              commit_msg=$(git log -1 --format="%s" "$commit_hash")
              MISSING_DCO="${MISSING_DCO}
          - \`${commit_hash:0:7}\`: ${commit_msg}"
            fi
          done
          
          if [ -n "$MISSING_DCO" ]; then
            echo "missing_dco=true" >> $GITHUB_OUTPUT
            # Escape newlines for GitHub output
            MISSING_DCO_ESCAPED="${MISSING_DCO//'%'/'%25'}"
            MISSING_DCO_ESCAPED="${MISSING_DCO_ESCAPED//$'\n'/'%0A'}"
            MISSING_DCO_ESCAPED="${MISSING_DCO_ESCAPED//$'\r'/'%0D'}"
            echo "commits=${MISSING_DCO_ESCAPED}" >> $GITHUB_OUTPUT
            echo "::error::Some commits are missing the DCO sign-off"
            exit 1
          else
            echo "missing_dco=false" >> $GITHUB_OUTPUT
            echo "All commits have the DCO sign-off"
          fi

      - name: Add helpful comment on failure
        if: failure() && steps.dco-check.outputs.missing_dco == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ❌ DCO Sign-off Missing
            
            The following commits are missing the required \`Signed-off-by\` line:
            
            ${{ steps.dco-check.outputs.commits }}
            
            ### How to fix this
            
            **Option 1: Amend the last commit (if it's the only one missing sign-off)**
            \`\`\`bash
            git commit --amend --signoff
            git push --force-with-lease
            \`\`\`
            
            **Option 2: Rebase and sign off all commits**
            \`\`\`bash
            git rebase --signoff origin/${{ github.base_ref }}
            git push --force-with-lease
            \`\`\`
            
            **Option 3: Sign off future commits automatically**
            Add \`-s\` or \`--signoff\` flag to your git commit command:
            \`\`\`bash
            git commit -s -m "Your commit message"
            \`\`\`
            
            ### Why is this required?
            
            The [Developer Certificate of Origin (DCO)](https://developercertificate.org/) is a lightweight way for contributors to certify that they wrote or have the right to submit the code they are contributing. See our [Contributing Guide](https://github.com/pipe-cd/pipecd/blob/master/CONTRIBUTING.md#contributor-license-agreement) for more details.
            `;
            
            // Check if we already posted this comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('DCO Sign-off Missing')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
