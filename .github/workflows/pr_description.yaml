name: pr_description

on:
  pull_request:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate PR description
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title || '';
            
            const issues = [];
            const suggestions = [];
            
            // Check if PR body is mostly empty (just template with no content)
            const strippedBody = prBody
              .replace(/\*\*What this PR does\*\*:?\s*/gi, '')
              .replace(/\*\*Why we need it\*\*:?\s*/gi, '')
              .replace(/\*\*Which issue\(s\) this PR fixes\*\*:?\s*/gi, '')
              .replace(/Fixes #\s*/gi, '')
              .replace(/\*\*Does this PR introduce a user-facing change\?\*\*:?\s*/gi, '')
              .replace(/- \*\*How are users affected by this change\*\*:?\s*/gi, '')
              .replace(/- \*\*Is this breaking change\*\*:?\s*/gi, '')
              .replace(/- \*\*How to migrate \(if breaking change\)\*\*:?\s*/gi, '')
              .replace(/\s+/g, ' ')
              .trim();
            
            // Check "What this PR does" section
            const whatMatch = prBody.match(/\*\*What this PR does\*\*:?\s*([^\n*]+)/i);
            const whatContent = whatMatch ? whatMatch[1].trim() : '';
            if (!whatContent || whatContent.length < 10) {
              issues.push('📝 **What this PR does** section is empty or too brief');
            }
            
            // Check "Why we need it" section
            const whyMatch = prBody.match(/\*\*Why we need it\*\*:?\s*([^\n*]+)/i);
            const whyContent = whyMatch ? whyMatch[1].trim() : '';
            if (!whyContent || whyContent.length < 10) {
              issues.push('🎯 **Why we need it** section is empty or too brief');
            }
            
            // Check for issue reference
            const issueRefMatch = prBody.match(/Fixes\s+#(\d+)/i) || 
                                  prBody.match(/Closes\s+#(\d+)/i) ||
                                  prBody.match(/Resolves\s+#(\d+)/i) ||
                                  prBody.match(/#(\d+)/);
            if (!issueRefMatch) {
              suggestions.push('🔗 Consider linking to a related issue (e.g., `Fixes #123`)');
            }
            
            // Check for WIP/Draft indicators
            const isWIP = prTitle.toLowerCase().includes('wip') || 
                          prTitle.toLowerCase().includes('[wip]') ||
                          prTitle.toLowerCase().includes('draft') ||
                          context.payload.pull_request.draft;
            
            // Store results
            core.setOutput('has_issues', issues.length > 0 ? 'true' : 'false');
            core.setOutput('has_suggestions', suggestions.length > 0 ? 'true' : 'false');
            core.setOutput('is_wip', isWIP ? 'true' : 'false');
            core.setOutput('issues', JSON.stringify(issues));
            core.setOutput('suggestions', JSON.stringify(suggestions));
            
            // Log for debugging
            console.log('Issues found:', issues);
            console.log('Suggestions:', suggestions);
            console.log('Is WIP:', isWIP);
            
            return {
              hasIssues: issues.length > 0,
              hasSuggestions: suggestions.length > 0,
              isWIP: isWIP
            };

      - name: Post feedback comment
        if: steps.validate.outputs.has_issues == 'true' || steps.validate.outputs.has_suggestions == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = JSON.parse('${{ steps.validate.outputs.issues }}');
            const suggestions = JSON.parse('${{ steps.validate.outputs.suggestions }}');
            const isWIP = '${{ steps.validate.outputs.is_wip }}' === 'true';
            
            let body = '';
            
            if (issues.length > 0) {
              body = `## 📋 PR Description Feedback
            
            ${isWIP ? '> ℹ️ This appears to be a work-in-progress PR. Feel free to update the description when ready.\n\n' : ''}
            
            Please update your PR description to help reviewers understand your changes:
            
            ${issues.map(issue => `- ${issue}`).join('\n')}
            
            `;
            }
            
            if (suggestions.length > 0) {
              if (!body) {
                body = `## 📋 PR Description Suggestions\n\n`;
              } else {
                body += `### Suggestions\n\n`;
              }
              body += `${suggestions.map(s => `- ${s}`).join('\n')}\n\n`;
            }
            
            if (body) {
              body += `---
            *A complete PR description helps maintainers review faster and ensures your contribution is properly documented in release notes.*`;
            
              // Check for existing comment
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const botComment = comments.data.find(comment => 
                comment.user.type === 'Bot' && 
                comment.body.includes('PR Description')
              );
              
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                });
              }
            }

      - name: Delete comment if description is complete
        if: steps.validate.outputs.has_issues == 'false' && steps.validate.outputs.has_suggestions == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            // Check for existing comment and delete it
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('PR Description')
            );
            
            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
              console.log('Deleted previous feedback comment as description is now complete');
            }
