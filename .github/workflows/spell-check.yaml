name: spell-check

on:
  pull_request:
    branches:
      - master
      - 'release-v*'
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/spell-check.yaml'

jobs:
  spell-check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check spelling
        uses: crate-ci/typos@v1.24.6
        with:
          config: .typos.toml
